<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Archive Detail | FAHSSA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
    <link rel="stylesheet" href="/assets/css/pages.css" />
    <style>
      .detail-card {
        max-width: 960px;
        margin: 0 auto;
        padding: 30px;
      }
      .detail-card img {
        width: 100%;
        border-radius: 18px;
        margin-bottom: 24px;
        object-fit: cover;
        min-height: 380px;
      }
      .detail-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 18px;
        margin-bottom: 18px;
      }
      .detail-meta span {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(14, 165, 233, 0.12);
        color: var(--primary-blue);
        padding: 10px 16px;
        border-radius: 999px;
        font-size: 0.95rem;
      }
      .detail-content {
        line-height: 1.9;
        color: var(--text-dark);
        font-size: 1rem;
      }
      .detail-content h2 {
        margin-top: 0;
        color: var(--primary-blue);
      }
      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 24px;
        color: var(--primary-blue);
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div class="header-box header-with-logos">
                <a href="/index.html" class="page-back-button" type="button">
                    <i class="fa-solid fa-chevron-left back-icon"></i>
                </a>
          <a href="/index.html" style="text-decoration: none;">
            <div class="header-logos">
                <img src="../fahssa.png" alt="FAHSSA logo" class="header-logo">
                <img src="../uniuyo.jpg" alt="University of Uyo logo" class="header-logo">
            </div>
          </a>
          <a href="/index.html" style="text-decoration: none;"><h1>FAHSSA</h1></a>
        </div>
        <button id="themeToggle" class="theme-button" type="button">
          <span class="theme-icon">ðŸŒ™</span>
        </button>
      </header>

      <main class="content-card detail-card">
        <a href="/pages/archive.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Archive</a>
        <div id="archiveDetailContent">
          <p class="loading">Loading event details...</p>
        </div>
      </main>
    </div>

    <script src="/assets/js/main.js"></script>
    <script src="/assets/js/api-config.js"></script>
    <script>
      const API_URL = window.API_URL;

      async function loadArchiveDetail() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const container = document.getElementById('archiveDetailContent');

        if (!id) {
          container.innerHTML = '<p style="color: red;">No archive item specified.</p>';
          return;
        }

        try {
          const response = await fetch(`${API_URL}/archive/${encodeURIComponent(id)}`);
          if (!response.ok) {
            throw new Error('Unable to load event details');
          }
          const event = await response.json();
          console.log('Archive detail loaded:', event);
          
          // Validate and normalize image URL
          let imageUrl = '/assets/images/placeholder.svg';
          if (event.image && typeof event.image === 'string' && event.image.trim()) {
            const normalized = window.normalizeMediaUrl(event.image);
            if (normalized && normalized.trim()) {
              imageUrl = normalized;
              console.log('Using detail image URL:', imageUrl);
            } else {
              console.warn('Image URL normalization returned empty:', event.image);
            }
          } else {
            console.warn('No valid image URL in event data - using placeholder');
          }
          
          const eventDate = event.date ? new Date(event.date) : null;
          const dateLabel = eventDate && !isNaN(eventDate) ? eventDate.toLocaleDateString() : 'Date not available';
          container.innerHTML = `
            <img src="${imageUrl}" alt="${event.title}" onerror="console.warn('Detail image failed:', '${imageUrl}'); this.src='/assets/images/placeholder.svg'">
            <div class="detail-meta">
              <span><i class="fa-solid fa-calendar-days"></i> ${dateLabel}</span>
              <span><i class="fa-solid fa-tag"></i> Event</span>
            </div>
            <div class="detail-content">
              <h2>${event.title}</h2>
              <p>${event.description}</p>
              <p>${event.content}</p>
            </div>
          `;
        } catch (error) {
          console.error('Error loading archive detail:', error);
          container.innerHTML = '<p style="color: red;">Event details could not be loaded. Please try again later.</p>';
        }
      }

      document.addEventListener('DOMContentLoaded', loadArchiveDetail);
    </script>
  </body>
</html>
