<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Faculty Departments | FAHSSA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <link rel="stylesheet" href="../assets/css/departments.css" />
</head>
<body>
    <div class="page-shell">
        <header class="topbar">
            <div class="header-box header-with-logos">`n                <a href="/index.html" class="page-back-button" type="button">`n                    <i class="fa-solid fa-arrow-left back-icon"></i>`n                </a>
                <div class="header-logos">
                    <img src="../fahssa.png" alt="FAHSSA logo" class="header-logo">
                    <img src="../uniuyo.jpg" alt="University of Uyo logo" class="header-logo">
                </div>
                <h1>Faculty Departments | FAHSSA</h1>
            </div>
            <button id="themeToggle" class="theme-button" type="button">
                <span class="theme-icon">ðŸŒ™</span>
            </button>
        </header>

        <main class="content-card">
            <section class="departments-section">
                <div class="departments-header">
                    <h2>Our Departments</h2>
                    <p>Explore the five pillars of excellence in our faculty</p>
                </div>

                <div class="departments-grid" id="departmentsList">
                    <div class="loading">
                        <i class="fa-solid fa-spinner fa-spin"></i>
                        <p>Loading departments...</p>
                    </div>
                </div>

                <div id="emptyState" class="empty-state" style="display: none;">
                    <i class="fa-solid fa-building"></i>
                    <h3>No Departments Found</h3>
                    <p>Please check back later</p>
                </div>
            </section>
        </main>
    </div>

    <!-- Department Detail Modal -->
    <div id="departmentModal" class="modal">
        <div class="modal-content department-modal">
            <button class="modal-close">&times;</button>
            <div id="modalBody" class="modal-body">
                <div class="dept-detail">
                    <div class="dept-logo-container">
                        <img id="deptLogo" src="" alt="Department Logo" class="dept-logo" />
                    </div>
                    <h2 id="deptName"></h2>
                    <p id="deptDescription" class="dept-desc"></p>
                    
                    <div class="dept-info">
                        <div class="info-item">
                            <strong>HOD:</strong>
                            <p id="deptHOD"></p>
                        </div>
                        <div class="info-item">
                            <strong>Contact:</strong>
                            <p id="deptContact"></p>
                        </div>
                        <div class="info-item">
                            <strong>Office Location:</strong>
                            <p id="deptLocation"></p>
                        </div>
                    </div>

                    <div class="dept-programs">
                        <h3>Programs Offered</h3>
                        <ul id="deptPrograms"></ul>
                    </div>

                    <div class="dept-achievements">
                        <h3>Recent Achievements</h3>
                        <p id="deptAchievements"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../assets/js/main.js"></script>
    <script type="module" src="../assets/js/firebase-config.js"></script>
    <script type="module" src="../assets/js/departments.js"></script>
</body>
</html>
