<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Faculty Departments | FAHSSA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <link rel="stylesheet" href="../assets/css/departments.css" />
</head>
<body>
    <div class="page-shell">
        <header class="topbar">
            <div class="header-box header-with-logos">
                <a href="/index.html" class="page-back-button" type="button">
                    <i class="fa-solid fa-chevron-left back-icon"></i>
                </a>
                <a href="/index.html" style="text-decoration: none;">
                    <div class="header-logos">
                        <img src="../fahssa.png" alt="FAHSSA logo" class="header-logo">
                        <img src="../uniuyo.jpg" alt="University of Uyo logo" class="header-logo">
                    </div>
                </a>
                <a href="/index.html" style="text-decoration: none;"><h1>Faculty Departments | FAHSSA</h1></a>
            </div>
            <button id="themeToggle" class="theme-button" type="button">
                <span class="theme-icon">ðŸŒ™</span>
            </button>
        </header>

        <main class="content-card">
            <section class="page-header">
                <h2><i class="fa-solid fa-building"></i> Departments</h2>
                <p>Explore our Faculty Departments</p>
            </section>

            <div id="departmentsList" class="department-cards-grid">
                <div class="loading">Loading departments...</div>
            </div>
        </main>
    </div>

    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/api-config.js"></script>
    <script>
      const API_URL = window.API_URL;

      async function loadDepartments() {
        try {
          const response = await fetch(`${API_URL}/departments/all`);
          const departments = await response.json();
          const container = document.getElementById('departmentsList');

          if (!container) return;
          container.innerHTML = '';

          if (!Array.isArray(departments) || departments.length === 0) {
            container.innerHTML = '<p style="text-align: center; grid-column: 1/-1; color: var(--text-light);">No departments found</p>';
            return;
          }

          departments.forEach((dept) => {
            // Validate logo URL
            let logoUrl = '/assets/images/placeholder.svg';
            if (dept.logo && typeof dept.logo === 'string' && dept.logo.trim()) {
              const normalized = window.normalizeMediaUrl(dept.logo);
              if (normalized && normalized.trim()) {
                logoUrl = normalized;
              }
            }

            const card = document.createElement('div');
            card.className = 'department-card';
            card.innerHTML = `
              <div class="dept-card-image">
                <img src="${logoUrl}" alt="${dept.name}" loading="lazy" 
                     onerror="this.onerror=null;this.src='/assets/images/placeholder.svg';">
              </div>
              <div class="dept-card-content">
                <h3>${dept.name || 'Department'}</h3>
                <p class="dept-card-hod"><strong>HOD:</strong> ${dept.hod || 'N/A'}</p>
                <p class="dept-card-desc">${dept.description || 'No description'}</p>
                <a href="/pages/department-detail.html?id=${encodeURIComponent(dept.id)}" class="view-details-btn">
                  View Details <i class="fa-solid fa-arrow-right"></i>
                </a>
              </div>
            `;
            container.appendChild(card);
          });
        } catch (error) {
          console.error('Error loading departments:', error);
          const container = document.getElementById('departmentsList');
          if (container) {
            container.innerHTML = '<p style="color: red;">Failed to load departments. Please try again later.</p>';
          }
        }
      }

      document.addEventListener('DOMContentLoaded', loadDepartments);
    </script>
</body>
</html>
