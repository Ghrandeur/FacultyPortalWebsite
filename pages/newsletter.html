<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Newsletter | FAHSSA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <link rel="stylesheet" href="../assets/css/newsletter.css" />
</head>
<body>
    <div class="page-shell">
        <header class="topbar">
            <div class="header-box header-with-logos">
                <a href="/index.html" class="page-back-button" type="button">
                    <i class="fa-solid fa-chevron-left back-icon"></i>
                </a>

                <a href="/index.html" style="text-decoration: none;">
                    <div class="header-logos">
                        <img src="../fahssa.png" alt="FAHSSA logo" class="header-logo">
                        <img src="../uniuyo.jpg" alt="University of Uyo logo" class="header-logo">
                    </div>
                </a>
                <a href="/index.html" style="text-decoration: none;"><h1>Our Newsletter | FAHSSA</h1></a>
            </div>
            <button id="themeToggle" class="theme-button" type="button">
                <span class="theme-icon">ðŸŒ™</span>
            </button>
        </header>

        <main class="content-card">
            <section class="newsletter-display-section">
                <div class="newsletter-header">
                    <h2>Latest Updates from FAHSSA</h2>
                    <p>Your curated source for faculty news and announcements</p>
                    <button id="unsubscribeBtn" class="unsubscribe-btn" style="display: none;">
                        <i class="fa-solid fa-envelope-circle-check"></i> Unsubscribe
                    </button>
                </div>

                <div class="newsletter-filters">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="announcement">Announcements</button>
                    <button class="filter-btn" data-filter="event">Events</button>
                    <button class="filter-btn" data-filter="achievement">Achievements</button>
                    <button class="filter-btn" data-filter="opportunity">Opportunities</button>
                </div>

                <div id="newsletterList" class="newsletter-list">
                    <div class="loading">
                        <i class="fa-solid fa-spinner fa-spin"></i>
                        <p>Loading newsletters...</p>
                    </div>
                </div>

                <div id="emptyState" class="empty-state" style="display: none;">
                    <i class="fa-solid fa-inbox"></i>
                    <h3>No Newsletters Yet</h3>
                    <p>Check back soon for our latest updates!</p>
                </div>
            </section>
        </main>
    </div>

    <!-- Newsletter Detail Modal -->
    <div id="newsletterModal" class="modal">
        <div class="modal-content newsletter-modal">
            <button class="modal-close">&times;</button>
            <div id="modalBody" class="modal-body"></div>
        </div>
    </div>

    <script src="../assets/js/main.js"></script>
    <script type="module" src="../assets/js/firebase-config.js"></script>
    <script type="module" src="../assets/js/newsletter.js"></script>
</body>
</html>
