<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document Detail | FAHSSA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
    <link rel="stylesheet" href="/assets/css/pages.css" />
    <style>
      .detail-card {
        max-width: 900px;
        margin: 0 auto;
        padding: 30px;
      }
      .document-detail {
        display: grid;
        gap: 30px;
      }
      .document-icon-wrapper {
        text-align: center;
      }
      .document-icon-large {
        font-size: 4rem;
        color: var(--primary-blue);
        margin-bottom: 12px;
      }
      .document-info h2 {
        color: var(--primary-blue);
        margin-top: 0;
      }
      .document-badge {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin: 6px 0;
        color: var(--text-dark);
      }
      .document-info p {
        line-height: 1.8;
        color: var(--text-dark);
        margin: 10px 0;
      }
      .document-actions-detail {
        display: flex;
        gap: 16px;
        margin-top: 30px;
        flex-wrap: wrap;
      }
      .btn-primary {
        background: var(--primary-blue);
        color: white;
        padding: 12px 28px;
        border-radius: 8px;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        transition: background 200ms ease;
        border: none;
        cursor: pointer;
        font-size: 1rem;
      }
      .btn-primary:hover {
        background: #0284C7;
      }
      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 24px;
        color: var(--primary-blue);
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div class="header-box">
                <a href="/index.html" class="page-back-button" type="button">
                    <i class="fa-solid fa-chevron-left back-icon"></i>
                </a>
          <a href="/index.html" style="text-decoration: none;"><h1>FAHSSA</h1></a>
        </div>
        <button id="themeToggle" class="theme-button" type="button">
          <span class="theme-icon">🌙</span>
        </button>
      </header>

      <main class="content-card detail-card">
        <a href="/pages/documents.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Documents</a>
        <div id="documentDetailContent">
          <p class="loading">Loading document details...</p>
        </div>
      </main>
    </div>

    <script src="/assets/js/main.js"></script>
    <script src="/assets/js/api-config.js"></script>
    <script>
      const API_URL = window.API_URL;

      async function loadDocumentDetail() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const container = document.getElementById('documentDetailContent');

        if (!id) {
          container.innerHTML = '<p style="color: red;">No document specified.</p>';
          return;
        }

        try {
          const response = await fetch(`${API_URL}/documents/${encodeURIComponent(id)}`);
          if (!response.ok) {
            throw new Error('Unable to load document details');
          }
          const doc = await response.json();
          container.innerHTML = `
            <div class="document-detail">
              <div class="document-icon-wrapper">
                <div class="document-icon-large"><i class="fa-solid fa-file-pdf"></i></div>
              </div>
              <div class="document-info">
                <h2>${doc.fileName}</h2>
                <p class="document-badge"><i class="fa-solid fa-tag"></i> <strong>Category:</strong> ${doc.category}</p>
                <p class="document-badge"><i class="fa-solid fa-calendar-days"></i> <strong>Uploaded:</strong> ${new Date(doc.uploadDate).toLocaleDateString()}</p>
                <p>${doc.description}</p>
                <div class="document-actions-detail">
                  <a href="${doc.fileUrl}" target="_blank" class="btn-primary">
                    <i class="fa-solid fa-download"></i> Download Document
                  </a>
                </div>
              </div>
            </div>
          `;
        } catch (error) {
          console.error('Error loading document detail:', error);
          container.innerHTML = '<p style="color: red;">Document details could not be loaded. Please try again later.</p>';
        }
      }

      document.addEventListener('DOMContentLoaded', loadDocumentDetail);
    </script>
  </body>
</html>
