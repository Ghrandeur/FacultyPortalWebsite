<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login | FAHSSA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <link rel="stylesheet" href="../assets/css/admin.css" />
  </head>
  <body class="admin-login">
    <div class="login-container">
      <div class="login-box">
        <h1>Admin Portal</h1>
        <p>FAHSSA Management System</p>
        
        <form id="loginForm">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" required placeholder="admin@faculty.edu.ng">
          </div>
          
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required placeholder="Enter password">
          </div>
          
          <button type="submit" class="login-btn">Login</button>
          
          <p id="errorMessage" style="color: red; display: none; margin-top: 15px;"></p>
        </form>
        
        <p class="login-info" style="margin-top: 30px; font-size: 0.9rem; color: #6B7280;">
          <i class="fa-solid fa-info-circle"></i>
          Use Firebase Authentication or contact the administrator for credentials.
        </p>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-storage-compat.js"></script>
    <script src="../assets/js/firebase-config.js"></script>
    <script src="../assets/js/admin-login.js"></script>
  </body>
</html>
